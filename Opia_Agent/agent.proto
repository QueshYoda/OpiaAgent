syntax = "proto3";

package agent;

service ServerManager {
  rpc PushMetrics (SystemMetrics) returns (MetricResponse) {}
  rpc CommandStream (stream CommandResult) returns (stream CommandRequest) {}
}

// Yeni eklenen Container veri yapısı
message ContainerInfo {
  string container_id = 1;
  string name = 2;
  string state = 3;   // running, exited, paused vb.
  string health = 4;  // healthy, unhealthy (eğer healthcheck varsa)
}

message SystemMetrics {
  string server_id = 1;
  double cpu_usage_percent = 2;
  double memory_usage_percent = 3;
  // Container'ların listesini tutacak dizi (repeated)
  repeated ContainerInfo containers = 4; 
}

message MetricResponse {
  bool success = 1;
}

message CommandRequest {
  string command_id = 1;
  string command = 2;
}

message CommandResult {
  string server_id = 1;
  string command_id = 2;
  string output = 3;
  int32 exit_code = 4;
}
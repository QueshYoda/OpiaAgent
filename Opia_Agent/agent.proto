syntax = "proto3";
package agent;

service ServerManager {
  rpc PushMetrics (SystemMetrics) returns (MetricResponse) {}
  rpc CommandStream (stream CommandResult) returns (stream CommandRequest) {}
}

message ContainerInfo {
  string container_id = 1;
  string name = 2;
  string state = 3;
  string health = 4;
  double cpu_percent = 5;      // YENİ: Container CPU
  double memory_mb = 6;        // YENİ: Container RAM (Megabyte)
}

// Yeni: Sistem servislerinin durumunu tutacak yapı
message ServiceInfo {
  string name = 1;
  string status = 2;
  double cpu_percent = 3;      // YENİ: Servis CPU
  double memory_mb = 4;        // YENİ: Servis RAM (Megabyte)
}

// Yeni: Sistem hata loglarını tutacak yapı
message ErrorLog {
  string log_message = 1;
}

message SystemMetrics {
  string server_id = 1;
  double cpu_usage_percent = 2;
  double memory_usage_percent = 3;
  double cf_tunnel_requests = 4; 
  repeated ContainerInfo containers = 5;
  repeated ServiceInfo services = 6;
  repeated ErrorLog error_logs = 7;
}

message MetricResponse {
  bool success = 1;
}

message CommandRequest {
  string command_id = 1;
  string command = 2;
}

message CommandResult {
  string server_id = 1;
  string command_id = 2;
  string output = 3;
  int32 exit_code = 4;
}
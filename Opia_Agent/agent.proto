syntax = "proto3";
package agent;

service ServerManager {
  rpc PushMetrics (SystemMetrics) returns (MetricResponse) {}
  rpc CommandStream (stream CommandResult) returns (stream CommandRequest) {}
}

message CloudflareInfo {
  double total_requests = 1;
  double successful_requests = 2;
  double server_errors = 3;
  double active_sessions = 4;
  double latency_ms = 5;
  double bytes_received = 6;
  double bytes_sent = 7;
}
message NetworkInfo {
  string interface_name = 1;
  double download_speed_mbps = 2; 
  double upload_speed_mbps = 3;   
}

message ProcessInfo {
  int32 pid = 1;
  string name = 2;
  double cpu_percent = 3;
  double memory_mb = 4;
}
message OpenPortInfo {
  int32 port = 1;
  string protocol = 2; // TCP, UDP
  string process_name = 3; // Örn: sshd, nginx
}

message TcpStateInfo {
  string state = 1; // Örn: ESTABLISHED, SYN_RECV, TIME_WAIT
  int32 count = 2;
}

message SmartDiskHealth {
  string device = 1; // Örn: /dev/sda
  string health_status = 2; // Örn: PASSED, FAILED
}

message SecurityLog {
  string message = 1;
}

message ContainerInfo {
  string container_id = 1;
  string name = 2;
  string state = 3;
  string health = 4;
  double cpu_percent = 5;
  double memory_mb = 6;
}

message ServiceInfo {
  string name = 1;
  string status = 2;
  double cpu_percent = 3;
  double memory_mb = 4;
}

message ErrorLog {
  string log_message = 1;
}

message DiskInfo {
  string device = 1;
  string mount_point = 2;
  string file_system = 3;
  double total_gb = 4;
  double used_gb = 5;
  double free_gb = 6;
  double usage_percent = 7;
  double read_speed_mb = 8;
  double write_speed_mb = 9;
  double inode_usage_percent = 10;
}

message OsInfo {
  string os_name = 1;
  string version = 2;
  string kernel_version = 3;
  string architecture = 4;
  int64 system_uptime_seconds = 5;
  double load_avg_1m = 6;
  double load_avg_5m = 7;
  double load_avg_15m = 8;
  int32 active_users = 9;
  int32 pending_updates = 10;
}

message HardwareInfo {
  string cpu_model = 1;
  int32 cpu_cores = 2;
  int32 cpu_logical_cores = 3;
  double total_ram_gb = 4;
  double cpu_temperature = 5;
  double current_cpu_freq_ghz = 6;
  double swap_total_gb = 7;
  double swap_used_gb = 8;
  double swap_usage_percent = 9;
}

message SystemMetrics {
  string server_id = 1;
  double cpu_usage_percent = 2;
  double memory_usage_percent = 3;
  CloudflareInfo cloudflare = 4;
  repeated ContainerInfo containers = 5;
  repeated ServiceInfo services = 6;
  repeated ErrorLog error_logs = 7;
  repeated DiskInfo disks = 8;
  OsInfo os_info = 9;
  HardwareInfo hardware_info = 10;
  repeated NetworkInfo network_interfaces = 11;
  repeated ProcessInfo top_processes = 12;
  repeated SecurityLog security_logs = 13;
  repeated OpenPortInfo open_ports = 14;
  repeated TcpStateInfo tcp_states = 15;
  repeated SmartDiskHealth smart_disk_health = 16;
}

message MetricResponse {
  bool success = 1;
}

message CommandRequest {
  string command_id = 1;
  string command = 2;
}

message CommandResult {
  string server_id = 1;
  string command_id = 2;
  string output = 3;
  int32 exit_code = 4;
}